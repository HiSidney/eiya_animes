<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/faa3c30f58.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/base.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    {% block title %}
    <link rel="stylesheet" href="style.css">
    <title>Eiya Animes</title>
    {% endblock %}
</head>
<body>
    <header>
        <nav>
            <ul>
                <div>
                    <li><img id="logo" src="{{ url_for('static', filename='img/logo.png')}}" alt="logo"></li>
                    <li><a href="/">Home</a></li>

                    <li class="dropdown">
                        <a href="#">Gênero <i class="fa-solid fa-caret-down"></i></a>
                        <div class="dropdown-content-generos">
                            <ul class="genero">
                                {% for genero in generos %}
                                <li><a href=animes/genero/{{genero[0]}} class="itens-lista"><i class="fa-solid fa-caret-right"></i> {{genero[1]}} </a></li>
                                {% endfor %}
                            </ul>
                        </div>
                    </li>
                    <li class="dropdown"><a href="/animes">Todos</a></li>
                </div>

                <li id="li-search">
                    <div id="search">
                        <input type="text" placeholder="Buscar anime">
                        <a href="#"><i class="fa-solid fa-magnifying-glass" style="color: blueviolet;"></i></a>
                    </div>
                </li>

                <li>
                    <a href="/login"><i class="fa-solid fa-user"></i></a>
                    <a id="button-login-cadastro" href='/cadastro'><i class="fa-solid fa-user-plus"></i></a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        {% block main %}
        {% endblock %}
    </main>
    <footer>
        <p>Feito com muito <i class="fa-solid fa-heart"></i> e café !!!</p>
        <p>&copy; copyright - todos os direitos reservados</p>
    </footer>
    {% block javascript %}
    <script src="{{ url_for('static', filename='js/script.js')}}"></script>
    {% endblock %}
</body>
</html>
